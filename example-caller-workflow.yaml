# Example: Place this in your crate repo at .github/workflows/deploy-docs.yaml
#
# Option A: Using the template as an external repo
name: Deploy Docs
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docs:
    uses: julien-blanchon/saddle-docs-builder/.github/workflows/build-deploy.yaml@main
    with:
      template-repo: julien-blanchon/saddle-docs-builder
    # Optional overrides:
    #   crate-dir: '.'
    #   skip-wasm: false
    #   deploy-branch: pages
    #   parallel-wasm: '4'
